spring.application.name=ramossomar

# Servidor
server.address=localhost
server.port=7000

# Banco de dados MySQL
spring.datasource.url=jdbc:mysql://187.127.43.161:3306/db_ramossomar?useSSL=false&serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=C0nV3Mu2026
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=500
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.open-in-view=false

# JSON em snake_case (Jackson 3 / Spring Boot 4)
spring.jackson.datatype.datetime.write-dates-as-timestamps=false

# JWT
app.jwt.secret=RamosSomarJwtSecretKey2026ConvertixSegurancaMuitoForteParaAssinaturaHS256
app.jwt.issuer=ramossomar-api

# Springdoc OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true

# Abrir Swagger no navegador ao iniciar a aplicação
app.swagger.abrir-navegador=true

# Upload de imagens (salvas no servidor com compressão)
app.upload.diretorio=uploads
app.upload.url-base=/uploads
app.upload.tamanho-maximo-mb=5
app.upload.qualidade-compressao=0.75
app.upload.largura-maxima-px=1920
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=20MB

# Importação automática de cidades (IBGE) e locais de votação (TSE)
app.importacao.uf=GO
app.importacao.batch-size=500
app.importacao.ibge.municipios-url=https://servicodados.ibge.gov.br/api/v1/localidades/estados/{uf}/municipios
app.importacao.tse.locais-votacao-url=https://cdn.tse.jus.br/estatistica/sead/odsele/eleitorado_locais_votacao/eleitorado_local_votacao_2024.zip
